<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text-sub: #6b6b66;
    --text-hint: #9b9b95;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── layout ── */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 2rem 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-logo {
    padding: 0 1.25rem 1.75rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .sidebar-logo h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .sidebar-logo p { font-size: 11.5px; color: var(--text-hint); margin-top: 2px; }

  .sidebar-section { padding: 0 1rem; margin-bottom: 1.5rem; }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-hint);
    text-transform: uppercase;
    padding: 0 0.25rem;
    margin-bottom: 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-sub);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.12s, color 0.12s;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--text); color: #fff; }
  .nav-item.active .nav-count { background: rgba(255,255,255,0.2); color: #fff; }
  .nav-count {
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-hint);
    border-radius: 20px;
    padding: 1px 7px;
    min-width: 22px;
    text-align: center;
  }

  .sidebar-bottom {
    margin-top: auto;
    padding: 1rem;
    border-top: 1px solid var(--border);
  }

  .main { flex: 1; padding: 2rem 2.5rem; max-width: 860px; }

  /* ── toolbar ── */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-hint);
  }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--text); }
  .search-wrap input::placeholder { color: var(--text-hint); }

  .btn-primary {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: #fff;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.12s;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* ── tag pills ── */
  .tag-filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .tag-pill {
    font-size: 11.5px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-md);
    background: var(--surface);
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.12s;
  }
  .tag-pill:hover { border-color: var(--text); color: var(--text); }
  .tag-pill.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── list header ── */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .list-count { font-size: 12px; color: var(--text-hint); }

  .sort-select {
    font-size: 12px;
    font-family: inherit;
    color: var(--text-sub);
    background: transparent;
    border: none;
    cursor: pointer;
    outline: none;
  }

  /* ── entry cards ── */
  .entries { display: flex; flex-direction: column; gap: 8px; }

  /* ── month groups ── */
  .month-group { margin-bottom: 4px; }
  .month-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 2px;
    cursor: pointer;
    user-select: none;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-sub);
  }
  .month-header:hover { color: var(--text); }
  .month-header .chev {
    font-size: 10px;
    color: var(--text-hint);
    transition: transform 0.15s;
  }
  .month-header.collapsed .chev { transform: rotate(-90deg); }
  .month-entries {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }
  .month-entries.collapsed { display: none; }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .entry-card:hover {
    border-color: var(--border-md);
    box-shadow: var(--shadow);
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }
  .entry-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .entry-date { font-size: 12px; color: var(--text-hint); }

  .cat-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .entry-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .entry-body {
    font-size: 12.5px;
    color: var(--text-sub);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entry-tags {
    margin-top: 10px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .entry-tag {
    font-size: 11px;
    color: var(--text-hint);
    background: var(--surface2);
    border-radius: 4px;
    padding: 1px 6px;
  }
  .entry-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .entry-card:hover .entry-actions { opacity: 1; }
  .act-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-hint);
    padding: 3px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    transition: color 0.12s, background 0.12s;
    font-size: 15px;
  }
  .act-btn:hover { color: var(--text); background: var(--surface2); }
  .act-btn.del:hover { color: #c0392b; }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-hint);
    font-size: 13px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.3; }

  /* ── modal ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.75rem;
    width: 100%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-hint);
    font-size: 20px;
    padding: 2px;
    line-height: 1;
    border-radius: 5px;
  }
  .close-btn:hover { color: var(--text); background: var(--surface2); }

  .form-row { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-sub); }
  .form-row input[type=text],
  .form-row input[type=password],
  .form-row input[type=date],
  .form-row select,
  .form-row textarea {
    padding: 8px 10px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color: var(--text); }
  .form-row textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
  .form-row input::placeholder,
  .form-row textarea::placeholder { color: var(--text-hint); }

  .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* tag input */
  .tag-input-box {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    cursor: text;
    min-height: 38px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .tag-input-box:focus-within { border-color: var(--text); }
  .tag-input-box input {
    border: none !important;
    padding: 0 !important;
    font-size: 12.5px;
    flex: 1;
    min-width: 80px;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
  }
  .t-chip {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11.5px;
    padding: 2px 7px;
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text-sub);
  }
  .t-chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-hint);
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }
  .t-chip button:hover { color: var(--text); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding-top: 4px;
  }
  .btn-cancel {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-sub);
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--border-md);
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-cancel:hover { background: var(--surface2); }

  /* ── detail view ── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 199;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .detail-panel {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    gap: 8px;
  }
  .detail-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  .detail-title { font-size: 18px; font-weight: 600; }
  .detail-body {
    font-size: 13.5px;
    color: var(--text-sub);
    line-height: 1.8;
    white-space: pre-wrap;
    margin-top: 0.75rem;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }
  .detail-body a, .entry-body a {
    color: #2563eb;
    text-decoration: underline;
    word-break: break-all;
  }
  .detail-body a:hover, .entry-body a:hover { color: #1d4ed8; }
  .detail-tags { margin-top: 1rem; display: flex; gap: 5px; flex-wrap: wrap; }
  .detail-tag {
    font-size: 12px;
    color: var(--text-sub);
    background: var(--surface2);
    border-radius: 5px;
    padding: 2px 8px;
  }
  .detail-footer {
    margin-top: 1.5rem;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .btn-edit {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: #fff;
    font-size: 12.5px;
    font-family: inherit;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .btn-edit:hover { opacity: 0.82; }

  /* ── custom category ── */
  .custom-nav-item { display: flex; align-items: center; gap: 2px; }
  .del-cat-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); font-size: 16px; line-height: 1;
    padding: 4px 5px; border-radius: 5px; flex-shrink: 0;
    transition: color 0.12s, background 0.12s;
  }
  .del-cat-btn:hover { color: #c0392b; background: #fce8e8; }
  .add-cat-row { display: flex; gap: 5px; align-items: center; }
  .add-cat-inp {
    flex: 1; min-width: 0;
    padding: 5px 8px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    font-size: 12px; font-family: inherit;
    background: var(--surface); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }
  .add-cat-inp:focus { border-color: var(--text); }
  .add-cat-inp::placeholder { color: var(--text-hint); }
  .add-cat-btn {
    padding: 5px 9px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text-sub);
    font-size: 12px; font-family: inherit;
    border: 1px solid var(--border-md);
    cursor: pointer; white-space: nowrap;
    transition: background 0.12s;
  }
  .add-cat-btn:hover { background: var(--border-md); color: var(--text); }

  /* ── recorder ── */
  .rec-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .rec-panel {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.75rem;
    width: 100%; max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .rec-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .rec-header h2 { font-size: 16px; font-weight: 600; }
  .rec-status {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 1rem; font-size: 13px; color: var(--text-sub);
  }
  .rec-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ccc; flex-shrink: 0;
  }
  .rec-dot.recording { background: #e53e3e; animation: recPulse 1s infinite; }
  @keyframes recPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .rec-timer { font-variant-numeric: tabular-nums; font-size: 13px; }
  .rec-controls { display: flex; gap: 8px; margin-bottom: 1rem; }
  .rec-btn {
    padding: 8px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; font-weight: 500;
    border: 1px solid var(--border-md); cursor: pointer;
    transition: background 0.12s;
  }
  .rec-btn-start { background: #e53e3e; color: #fff; border-color: #e53e3e; }
  .rec-btn-start:hover { background: #c53030; }
  .rec-btn-stop { background: var(--surface2); color: var(--text); }
  .rec-btn-stop:hover { background: var(--border-md); }
  .rec-transcript {
    width: 100%; min-height: 160px; max-height: 300px;
    padding: 10px 12px; border: 1px solid var(--border-md);
    border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
    line-height: 1.7; resize: vertical; background: var(--surface);
    color: var(--text); outline: none;
  }
  .rec-transcript:focus { border-color: var(--text); }
  .rec-footer {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem;
  }
  .rec-hint {
    font-size: 11.5px; color: var(--text-hint); margin-top: 6px;
  }

  /* ── mobile nav ── */
  .mobile-topbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .mobile-topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .hamburger-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    color: var(--text);
    border-radius: 6px;
  }
  .hamburger-btn:hover { background: var(--surface2); }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 99;
  }
  .sidebar-backdrop.open { display: block; }

  @media (max-width: 860px) {
    .layout { flex-direction: column; }
    .mobile-topbar { display: flex; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      box-shadow: 0 0 28px rgba(0,0,0,0.15);
    }
    .sidebar.open { transform: translateX(0); }
    .main { padding: 1.25rem; max-width: 100%; }
    .form-2col { grid-template-columns: 1fr; }
    .overlay, .detail-overlay { padding: 0.75rem; }
    .modal, .detail-panel { padding: 1.25rem; }
  }

  @media (hover: none) {
    .entry-actions { opacity: 1; }
  }

  @media (max-width: 480px) {
    .main { padding: 1rem 0.85rem; }
    .entry-card { padding: 0.9rem 1rem; }
    .toolbar { flex-wrap: wrap; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
</style>
</head>
<body>

<!-- login screen -->
<div class="overlay" id="login-overlay" style="display:flex">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <h2>🔒 로그인</h2>
    </div>
    <div class="form-row">
      <label class="form-label">이메일</label>
      <input type="text" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
    </div>
    <div class="form-row">
      <label class="form-label">비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
    </div>
    <p id="login-error" style="color:#c0392b;font-size:12px;min-height:14px"></p>
    <div class="modal-footer">
      <button class="btn-primary" style="width:100%;justify-content:center" onclick="login()">로그인</button>
    </div>
  </div>
</div>

<div class="layout" id="app-layout" style="display:none">
  <!-- mobile top bar -->
  <div class="mobile-topbar">
    <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="메뉴">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1>📋 회의록</h1>
    <div style="width:28px"></div>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>📋 회의록</h1>
      <p>파트장·팀장 회의</p>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">카테고리</p>
      <div id="cat-nav"></div>
    </div>

    <div class="sidebar-section">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://anivpqhjfnhebciifozy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AOGKFoiEdiSq4AFdE5WRdQ_KjE8b8G_';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let FIXED_CATS = ['본부 회의', '파트장 회의', '파트 회의', '기타'];
const FIXED_COLORS = {
  '본부 회의':  { bg:'#EBF3FF', color:'#1557A0' },
  '파트장 회의':{ bg:'#E4F7EE', color:'#0F6E56' },
  '파트 회의':  { bg:'#FEF3E2', color:'#8A4F08' },
  '기타':       { bg:'#EFEFED', color:'#4A4A47' }
};
const CUSTOM_COLORS = [
  { bg:'#FDEDF4', color:'#8C2A54' },
  { bg:'#EDE8FB', color:'#4A2FA0' },
  { bg:'#E8F7F0', color:'#1A6645' },
  { bg:'#FFF3E0', color:'#8A5500' },
  { bg:'#FCE8E8', color:'#9B2626' },
  { bg:'#E8F4FB', color:'#1A5E8A' },
];

let data = [];
let customCats = [];
let customCatRows = [];
let activeCat = '전체';
let activeTag = null;
let editId = null;
let detailId = null;
let pendingTags = [];
let currentUser = null;
let collapsedMonths = new Set();
let collapseInitialized = false;

/* ── mobile sidebar ── */
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}

/* ── auth ── */
async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { data: res, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = '로그인 실패: 이메일 또는 비밀번호를 확인해주세요.'; return; }
  currentUser = res.user;
  await showApp();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  data = [];
  customCats = [];
  customCatRows = [];
  document.getElementById('app-layout').style.display = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

async function showApp() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app-layout').style.display = 'flex';
  await loadCustomCats();
  await loadNotes();
  render();
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await showApp();
  }
}

/* ── data load (Supabase) ── */
async function loadNotes() {
  const { data: rows, error } = await sb.from('notes').select('*').order('date', { ascending: false });
  if (error) { alert('회의록을 불러오지 못했습니다: ' + error.message); return; }
  data = rows.map(r => ({ id: r.id, date: r.date, cat: r.cat, title: r.title, body: r.body, tags: r.tags || [] }));
  if (!collapseInitialized) {
    const keys = [...new Set(data.map(e => e.date.slice(0,7)))].sort().reverse();
    collapsedMonths = new Set(keys.slice(2));
    collapseInitialized = true;
  }
}

async function loadCustomCats() {
  const { data: rows, error } = await sb.from('custom_categories').select('*').order('created_at', { ascending: true });
  if (error) { alert('카테고리를 불러오지 못했습니다: ' + error.message); return; }
  customCatRows = rows;
  customCats = rows.map(r => r.name);
}

function getCatColor(cat) {
  if (FIXED_COLORS[cat]) return FIXED_COLORS[cat];
  const idx = customCats.indexOf(cat);
  return CUSTOM_COLORS[idx % CUSTOM_COLORS.length] || CUSTOM_COLORS[0];
}

function allCatList() {
  return [...FIXED_CATS, ...customCats];
}

function allTags() {
  const m = {};
  data.forEach(e => e.tags.forEach(t => { m[t] = (m[t]||0)+1; }));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}

function renderSidebar() {
  const fixedItems = ['전체', ...FIXED_CATS].map(c => {
    const cnt = c === '전체' ? data.length : data.filter(e=>e.cat===c).length;
    if (c === '전체') return `<button class="nav-item${activeCat===c?' active':''}" onclick="setCat('${c}')">
      <span>${esc(c)}</span><span class="nav-count">${cnt}</span>
    </button>`;
    return `<div class="custom-nav-item">
      <button class="nav-item${activeCat===c?' active':''}" style="flex:1;min-width:0" onclick="setCat('${esc(c)}')">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c)}</span>
        <span class="nav-count">${cnt}</span>
      </button>
      <button class="del-cat-btn" onclick="editFixedCat('${esc(c)}')" title="카테고리 수정">✎</button>
    </div>`;
  }).join('');

  const customItems = customCats.map((c,i) => {
    const cnt = data.filter(e=>e.cat===c).length;
    return `<div class="custom-nav-item">
      <button class="nav-item${activeCat===c?' active':''}" style="flex:1;min-width:0" onclick="setCat('${esc(c)}')">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c)}</span>
        <span class="nav-count">${cnt}</span>
      </button>
      <button class="del-cat-btn" onclick="editCustomCat(${i})" title="카테고리 수정">✎</button>
      <button class="del-cat-btn" onclick="deleteCustomCat(${i})" title="카테고리 삭제">×</button>
    </div>`;
  }).join('');

  const addRow = `<div style="margin-top:6px">
    <div class="add-cat-row">
      <input id="new-cat-inp" class="add-cat-inp" placeholder="새 카테고리 이름" onkeydown="if(event.key==='Enter')addCustomCat()">
      <button class="add-cat-btn" onclick="addCustomCat()">추가</button>
    </div>
  </div>`;

  document.getElementById('cat-nav').innerHTML = fixedItems;
  document.getElementById('custom-cat-section').innerHTML = customItems + addRow;
}

function renderTagFilters() {
  const tags = allTags();
  const el = document.getElementById('tag-filters');
  if (!tags.length) { el.innerHTML=''; return; }
  el.innerHTML = tags.map(t =>
    `<span class="tag-pill${activeTag===t?' active':''}" onclick="setTag('${t}')">#${esc(t)}</span>`
  ).join('');
}

function entryCardHtml(e) {
  const c = getCatColor(e.cat);
  return `<div class="entry-card" onclick="openDetail('${e.id}')">
      <div class="entry-header">
        <div>
          <div class="entry-meta">
            <span class="cat-badge" style="background:${c.bg};color:${c.color}">${e.cat}</span>
            <span class="entry-date">${e.date}</span>
          </div>
          <p class="entry-title">${esc(e.title)||'(제목 없음)'}</p>
        </div>
        <div class="entry-actions">
          <button class="act-btn" onclick="event.stopPropagation();openModal('${e.id}')" title="수정">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="act-btn del" onclick="event.stopPropagation();deleteEntry('${e.id}')" title="삭제">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <p class="entry-body">${linkify(e.body)}</p>
      ${e.tags.length ? `<div class="entry-tags">${e.tags.map(t=>`<span class="entry-tag">#${esc(t)}</span>`).join('')}</div>`:''}
    </div>`;
}

function toggleMonth(key) {
  if (collapsedMonths.has(key)) collapsedMonths.delete(key); else collapsedMonths.add(key);
  renderList();
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;

  let list = data.slice();
  if (activeCat !== '전체') list = list.filter(e=>e.cat===activeCat);
  if (activeTag) list = list.filter(e=>e.tags.includes(activeTag));
  if (q) list = list.filter(e=>(e.title+e.body+e.tags.join(' ')+e.cat).toLowerCase().includes(q));
  list.sort((a,b)=> sort==='desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));

  document.getElementById('list-count').textContent = `${list.length}건`;

  const el = document.getElementById('entries');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>기록된 회의록이 없습니다</div>`;
    return;
  }

  const forceExpand = !!q;
  const groups = [];
  const groupMap = {};
  list.forEach(e => {
    const key = e.date.slice(0,7);
    if (!groupMap[key]) { groupMap[key] = []; groups.push(key); }
    groupMap[key].push(e);
  });

  el.innerHTML = groups.map(key => {
    const items = groupMap[key];
    const collapsed = !forceExpand && collapsedMonths.has(key);
    const [y, m] = key.split('-');
    return `<div class="month-group">
      <div class="month-header${collapsed?' collapsed':''}" onclick="toggleMonth('${key}')">
        <span class="chev">▾</span>
        <span>${y}년 ${parseInt(m,10)}월</span>
        <span class="nav-count">${items.length}</span>
      </div>
      <div class="month-entries${collapsed?' collapsed':''}">${items.map(entryCardHtml).join('')}</div>
    </div>`;
  }).join('');
}

function render() { renderSidebar(); renderTagFilters(); renderList(); }
function setCat(c) { activeCat=c; activeTag=null; closeSidebar(); render(); }
function setTag(t) { activeTag = activeTag===t ? null : t; renderTagFilters(); renderList(); }

async function addCustomCat() {
  const inp = document.getElementById('new-cat-inp');
  const v = inp.value.trim();
  if (!v) return;
  if ([...FIXED_CATS, ...customCats].includes(v)) { alert('이미 존재하는 카테고리입니다.'); return; }
  const { error } = await sb.from('custom_categories').insert({ name: v, user_id: currentUser.id });
  if (error) { alert('카테고리 추가 실패: ' + error.message); return; }
  inp.value = '';
  await loadCustomCats();
  render();
}
async function editFixedCat(oldName) {
  const newName = prompt('카테고리 이름 수정', oldName);
  if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
  const v = newName.trim();
  if ([...FIXED_CATS, ...customCats].includes(v)) { alert('이미 존재하는 카테고리입니다.'); return; }
  const { error } = await sb.from('notes').update({ cat: v }).eq('cat', oldName);
  if (error) { alert('회의록 카테고리 변경 실패: ' + error.message); return; }
  const idx = FIXED_CATS.indexOf(oldName);
  if (idx !== -1) {
    FIXED_CATS[idx] = v;
    const col = FIXED_COLORS[oldName];
    if (col) { FIXED_COLORS[v] = col; delete FIXED_COLORS[oldName]; }
  }
  if (activeCat === oldName) activeCat = v;
  await loadNotes();
  render();
}
async function editCustomCat(i) {
  const row = customCatRows[i];
  const oldName = row.name;
  const newName = prompt('카테고리 이름 수정', oldName);
  if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
  const v = newName.trim();
  if ([...FIXED_CATS, ...customCats].includes(v)) { alert('이미 존재하는 카테고리입니다.'); return; }
  const { error } = await sb.from('custom_categories').update({ name: v }).eq('id', row.id);
  if (error) { alert('카테고리 수정 실패: ' + error.message); return; }
  const { error: upErr } = await sb.from('notes').update({ cat: v }).eq('cat', oldName);
  if (upErr) { alert('회의록 카테고리 변경 실패: ' + upErr.message); return; }
  if (activeCat === oldName) activeCat = v;
  await loadNotes();
  await loadCustomCats();
  render();
}
async function deleteCustomCat(i) {
  const row = customCatRows[i];
  const name = row.name;
  const used = data.filter(e=>e.cat===name).length;
  if (used > 0 && !confirm(`"${name}" 카테고리는 ${used}개 회의록에 사용 중입니다. 삭제하면 해당 회의록은 '기타'로 변경됩니다. 계속할까요?`)) return;
  if (used > 0) {
    const { error: upErr } = await sb.from('notes').update({ cat: '기타' }).eq('cat', name);
    if (upErr) { alert('회의록 변경 실패: ' + upErr.message); return; }
  }
  const { error } = await sb.from('custom_categories').delete().eq('id', row.id);
  if (error) { alert('카테고리 삭제 실패: ' + error.message); return; }
  if (activeCat === name) activeCat = '전체';
  await loadNotes();
  await loadCustomCats();
  render();
}

/* ── modal ── */
function buildCatOptions(selected) {
  const allCats = [...FIXED_CATS, ...customCats];
  return allCats.map(c => `<option${c===selected?' selected':''}>${esc(c)}</option>`).join('');
}

function openModal(id) {
  editId = id || null;
  pendingTags = [];
  const catSel = document.getElementById('f-cat');
  if (id) {
    const e = data.find(x=>x.id===id);
    document.getElementById('modal-title').textContent = '회의록 수정';
    document.getElementById('f-date').value = e.date;
    catSel.innerHTML = buildCatOptions(e.cat);
    document.getElementById('f-title').value = e.title;
    document.getElementById('f-body').value = e.body;
    pendingTags = [...e.tags];
  } else {
    document.getElementById('modal-title').textContent = '새 회의록 추가';
    document.getElementById('f-date').value = today();
    catSel.innerHTML = buildCatOptions('본부 회의');
    document.getElementById('f-title').value = '';
    document.getElementById('f-body').value = '';
  }
  renderChips();
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(()=>document.getElementById('f-title').focus(), 50);
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function handleTag(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = e.target.value.trim().replace(/^#/,'');
    if (v && !pendingTags.includes(v)) { pendingTags.push(v); renderChips(); }
    e.target.value = '';
  }
}
function removeChip(i) { pendingTags.splice(i,1); renderChips(); }
function renderChips() {
  const box = document.getElementById('tag-box');
  const inp = document.getElementById('tag-inp');
  box.querySelectorAll('.t-chip').forEach(x=>x.remove());
  pendingTags.forEach((t,i) => {
    const chip = document.createElement('span');
    chip.className = 't-chip';
    chip.innerHTML = `#${esc(t)}<button onclick="removeChip(${i})">×</button>`;
    box.insertBefore(chip, inp);
  });
}

async function saveEntry() {
  const date = document.getElementById('f-date').value;
  const cat  = document.getElementById('f-cat').value;
  const title= document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  if (!title && !body) { alert('제목 또는 내용을 입력해 주세요.'); return; }
  const payload = { date, cat, title, body, tags: [...pendingTags] };
  let error;
  if (editId) {
    ({ error } = await sb.from('notes').update(payload).eq('id', editId));
  } else {
    ({ error } = await sb.from('notes').insert({ ...payload, user_id: currentUser.id }));
  }
  if (error) { alert('저장 실패: ' + error.message); return; }
  await loadNotes();
  closeModal(); render();
}

async function deleteEntry(id) {
  if (!confirm('이 회의록을 삭제하시겠습니까?')) return;
  const { error } = await sb.from('notes').delete().eq('id', id);
  if (error) { alert('삭제 실패: ' + error.message); return; }
  await loadNotes();
  render();
}

/* ── detail ── */
function openDetail(id) {
  detailId = id;
  const e = data.find(x=>x.id===id);
  const c = getCatColor(e.cat);
  document.getElementById('d-meta').innerHTML =
    `<span class="cat-badge" style="background:${c.bg};color:${c.color}">${e.cat}</span>
     <span class="entry-date">${e.date}</span>`;
  document.getElementById('d-title').textContent = e.title || '(제목 없음)';
  document.getElementById('d-body').innerHTML = linkify(e.body);
  document.getElementById('d-tags').innerHTML = e.tags.map(t=>`<span class="detail-tag">#${esc(t)}</span>`).join('');
  document.getElementById('detail-overlay').style.display = 'flex';
}
function closeDetail() { document.getElementById('detail-overlay').style.display = 'none'; }
function editFromDetail() { closeDetail(); openModal(detailId); }

/* ── utils ── */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(s){ return esc(s).replace(/(https?:\/\/[^\s<>&]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>'); }
function today(){ return new Date().toISOString().slice(0,10); }

/* ── recorder ── */
let recRecognition = null;
let recIsRecording = false;
let recTimerInterval = null;
let recSeconds = 0;
let recTranscript = '';
let recInterim = '';

function openRecorder() {
  document.getElementById('rec-overlay').style.display = 'flex';
  document.getElementById('rec-transcript').value = '';
  document.getElementById('rec-status-text').textContent = '대기 중';
  document.getElementById('rec-dot').classList.remove('recording');
  document.getElementById('rec-start-btn').textContent = '녹음 시작';
  document.getElementById('rec-start-btn').classList.add('rec-btn-start');
  document.getElementById('rec-start-btn').classList.remove('rec-btn-stop');
  document.getElementById('rec-timer').textContent = '00:00:00';
  recTranscript = '';
  recInterim = '';
  recSeconds = 0;
}
function closeRecorder() {
  if (recIsRecording) stopRecording();
  document.getElementById('rec-overlay').style.display = 'none';
}

function toggleRecording() {
  if (recIsRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 또는 Edge를 사용해 주세요.'); return; }

  recRecognition = new SR();
  recRecognition.lang = 'ko-KR';
  recRecognition.continuous = true;
  recRecognition.interimResults = true;
  recRecognition.maxAlternatives = 1;

  recRecognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    if (final) recTranscript += final;
    recInterim = interim;
    document.getElementById('rec-transcript').value = (recTranscript + recInterim).trim();
  };

  recRecognition.onend = () => {
    if (recIsRecording) recRecognition.start();
  };

  recRecognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.error('STT error:', e.error);
  };

  recRecognition.start();
  recIsRecording = true;
  recSeconds = 0;
  document.getElementById('rec-dot').classList.add('recording');
  document.getElementById('rec-status-text').textContent = '녹음 중...';
  document.getElementById('rec-start-btn').textContent = '녹음 중지';
  document.getElementById('rec-start-btn').classList.remove('rec-btn-start');
  document.getElementById('rec-start-btn').classList.add('rec-btn-stop');
  recTimerInterval = setInterval(() => {
    recSeconds++;
    if (recSeconds >= 7200) stopRecording();
    const h = String(Math.floor(recSeconds/3600)).padStart(2,'0');
    const m = String(Math.floor((recSeconds%3600)/60)).padStart(2,'0');
    const s = String(recSeconds%60).padStart(2,'0');
    document.getElementById('rec-timer').textContent = `${h}:${m}:${s}`;
  }, 1000);
}

function stopRecording() {
  if (recRecognition) { recIsRecording = false; recRecognition.stop(); recRecognition = null; }
  clearInterval(recTimerInterval);
  recTranscript += recInterim;
  recInterim = '';
  document.getElementById('rec-transcript').value = recTranscript.trim();
  document.getElementById('rec-dot').classList.remove('recording');
  document.getElementById('rec-status-text').textContent = '녹음 완료';
  document.getElementById('rec-start-btn').textContent = '녹음 시작';
  document.getElementById('rec-start-btn').classList.add('rec-btn-start');
  document.getElementById('rec-start-btn').classList.remove('rec-btn-stop');
}

function saveRecordingAsNote() {
  const text = document.getElementById('rec-transcript').value.trim();
  if (!text) { alert('변환된 텍스트가 없습니다.'); return; }
  closeRecorder();
  openModal();
  document.getElementById('f-body').value = text;
}

init();
</script>
